<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IoT Quiz - 50 Questions</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            max-width: 800px;
            width: 100%;
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 3px solid #667eea;
            padding-bottom: 20px;
        }

        .header h1 {
            color: #333;
            font-size: 2em;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 1.1em;
        }

        .progress {
            width: 100%;
            height: 10px;
            background: #e0e0e0;
            border-radius: 10px;
            margin: 20px 0;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.3s ease;
        }

        .question-section {
            display: none;
        }

        .question-section.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .question-counter {
            color: #667eea;
            font-weight: bold;
            font-size: 0.9em;
            margin-bottom: 10px;
        }

        .question-text {
            font-size: 1.2em;
            color: #333;
            margin: 20px 0;
            line-height: 1.6;
        }

        .answer-input {
            width: 100%;
            padding: 12px;
            margin: 20px 0;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        .answer-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }

        .options-container {
            margin: 25px 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option {
            display: flex;
            align-items: center;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #fff;
        }

        .option:hover {
            border-color: #667eea;
            background: #f9f9ff;
            transform: translateX(5px);
        }

        .option input[type="radio"] {
            width: 20px;
            height: 20px;
            margin-right: 15px;
            cursor: pointer;
            accent-color: #667eea;
        }

        .option label {
            flex: 1;
            cursor: pointer;
            font-size: 1em;
            color: #333;
            margin: 0;
        }

        .option input[type="radio"]:checked + label {
            color: #667eea;
            font-weight: 600;
        }

        .option input[type="radio"]:checked {
            accent-color: #667eea;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
            justify-content: space-between;
        }

        button {
            padding: 12px 30px;
            font-size: 1em;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        .btn-prev {
            background: #ccc;
            color: #333;
        }

        .btn-prev:hover {
            background: #bbb;
        }

        .btn-next {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            flex: 1;
        }

        .btn-next:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-next:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-submit {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: white;
            width: 100%;
            padding: 15px;
            font-size: 1.1em;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(245, 87, 108, 0.4);
        }

        .results {
            display: none;
            text-align: center;
        }

        .results.show {
            display: block;
        }

        .results h2 {
            font-size: 2em;
            color: #667eea;
            margin: 20px 0;
        }

        .results-table {
            width: 100%;
            margin-top: 30px;
            border-collapse: collapse;
        }

        .results-table th,
        .results-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }

        .results-table th {
            background: #f5f5f5;
            font-weight: bold;
            color: #333;
        }

        .results-table tr:hover {
            background: #f9f9f9;
        }

        .btn-restart {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            margin-top: 20px;
        }

        .btn-download {
            background: linear-gradient(135deg, #43e97b, #38f9d7);
            color: white;
            margin-top: 10px;
        }

        .instruction {
            background: #f0f4ff;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin: 20px 0;
            border-radius: 5px;
            color: #333;
        }

        .feedback-section {
            display: none;
            margin: 25px 0;
            padding: 20px;
            border-radius: 8px;
            animation: slideDown 0.3s ease;
        }

        .feedback-section.show {
            display: block;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .feedback-correct {
            background: #e8f9f5;
            border: 2px solid #43e97b;
            color: #0d7761;
        }

        .feedback-incorrect {
            background: #ffe8e8;
            border: 2px solid #f5576c;
            color: #8b0000;
        }

        .feedback-header {
            font-weight: bold;
            font-size: 1.1em;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .feedback-correct .feedback-header {
            color: #43e97b;
        }

        .feedback-incorrect .feedback-header {
            color: #f5576c;
        }

        .feedback-content {
            margin: 10px 0 0 0;
            line-height: 1.6;
        }

        .correct-answer-label {
            font-weight: bold;
            color: #43e97b;
            margin-top: 10px;
        }
    </style>
</head>
<body>

            <div class="progress-bar" id="progressBar"></div>

            <h2>Quiz Completed!</h2>

            <div id="answersDisplay"></div>
            <button class="btn-restart" onclick="location.reload()">Start Over</button>

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // Randomize question order on every page refresh
        const questions = shuffleArray([...questionBank]);

        let currentQuestion = 0;
        let answers = {};
        let answered = {};

        function initQuiz() {
            const container = document.getElementById('quizContainer');
            questions.forEach((q, index) => {
                const section = document.createElement('div');
                section.className = 'question-section';
                section.id = `question-${index}`;
                
                let optionsHtml = '';
                q.options.forEach((option, optIndex) => {
                    optionsHtml += `
                        <div class="option">
                            <input type="radio" 
                                   id="option-${index}-${optIndex}" 
                                   name="answer-${index}" 
                                   value="${optIndex}"
                                   onchange="saveAnswer(${index}, ${optIndex})"
                                   ${answers[index] === optIndex ? 'checked' : ''}>
                            <label for="option-${index}-${optIndex}">${option}</label>
                        </div>
                    `;
                });
                
                section.innerHTML = `
                    <div class="question-counter">Question ${index + 1} of ${questions.length}</div>
                    <div class="question-text">${q.question}</div>
                    <div class="options-container">
                        ${optionsHtml}
                    </div>
                    <div class="feedback-section" id="feedback-${index}">
                        <div class="feedback-content"></div>
                    </div>
                    <div class="button-group">
                        <button class="btn-prev" id="btn-prev-${index}" onclick="previousQuestion()" ${index === 0 ? 'disabled' : ''}>← Previous</button>
                        <button class="btn-next" id="btn-next-${index}" onclick="nextQuestion()" disabled>${index === questions.length - 1 ? 'Submit Quiz' : 'Next →'}</button>
                    </div>
                `;
                
                container.appendChild(section);
            });

            showQuestion(0);
        }

        function showQuestion(index) {
            document.querySelectorAll('.question-section').forEach(el => {
                el.classList.remove('active');
            });
            
            document.getElementById(`question-${index}`).classList.add('active');

            // Update progress bar
            const progress = ((index + 1) / questions.length) * 100;
            document.getElementById('progressBar').style.width = progress + '%';

            currentQuestion = index;
            
            // Disable/enable prev button
            const prevBtn = document.querySelector('.btn-prev');
            prevBtn.disabled = index === 0;

            // Scroll to top
            document.querySelector('.container').scrollTop = 0;
        }

        function saveAnswer(index, optionIndex) {
            answers[index] = optionIndex;
            answered[index] = true;

            // Show feedback immediately
            showFeedback(index);

            // Enable next button
            document.getElementById(`btn-next-${index}`).disabled = false;

            // Disable all options after selection
            const options = document.querySelectorAll(`input[name="answer-${index}"]`);
            options.forEach(opt => {
                opt.disabled = true;
            });
        }

        function showFeedback(index) {
            const question = questions[index];
            const selectedOption = answers[index];
            const feedbackDiv = document.getElementById(`feedback-${index}`);
            const isCorrect = selectedOption === question.correct;
            
            let feedbackHTML = '';

            if (isCorrect) {
                feedbackHTML = `
                    <div class="feedback-header">✓ Correct Answer!</div>
                    <div class="feedback-content">
                        Great job! You selected the right option.
                    </div>
                `;
                feedbackDiv.className = 'feedback-section feedback-correct show';
            } else {
                feedbackHTML = `
                    <div class="feedback-header">✗ Incorrect</div>
                    <div class="feedback-content">
                        Your answer: <strong>${question.options[selectedOption]}</strong>
                        <div class="correct-answer-label">Correct answer: ${question.options[question.correct]}</div>
                    </div>
                `;
                feedbackDiv.className = 'feedback-section feedback-incorrect show';
            }

            feedbackDiv.innerHTML = feedbackHTML;
        }

        function nextQuestion() {
            if (currentQuestion < questions.length - 1) {
                showQuestion(currentQuestion + 1);
            } else {
                submitQuiz();
            }
        }

        function previousQuestion() {
            if (currentQuestion > 0) {
                showQuestion(currentQuestion - 1);
            }
        }

        function submitQuiz() {
            // Calculate score
            let score = 0;
            
            questions.forEach((question, index) => {
                if (answers[index] === question.correct) {
                    score++;
                }
            });

            // Hide quiz, show results
            document.getElementById('quizContainer').style.display = 'none';
            document.getElementById('resultsContainer').classList.add('show');

            // Display score
            const percentage = Math.round((score / questions.length) * 100);
            const scoreDisplay = document.querySelector('.results h2');
            
            let performanceMessage = '';
            if (percentage >= 90) {
                performanceMessage = '🌟 Outstanding!';
            } else if (percentage >= 80) {
                performanceMessage = '🎉 Excellent!';
            } else if (percentage >= 70) {
                performanceMessage = '👍 Good Job!';
            } else if (percentage >= 60) {
                performanceMessage = '📚 Keep Learning!';
            } else {
                performanceMessage = '💪 Keep Trying!';
            }

            scoreDisplay.innerHTML = `Quiz Completed!<br><span style="font-size: 1.4em; color: ${percentage >= 70 ? '#43e97b' : '#f5576c'};">${performanceMessage}</span><br><span style="font-size: 1.5em; color: #667eea;">Score: ${score}/${questions.length} (${percentage}%)</span>`;

            // Display answers with correct/incorrect feedback
            const answersDisplay = document.getElementById('answersDisplay');
            let html = '<table class="results-table"><thead><tr><th>Q#</th><th>Question</th><th>Your Answer</th><th>Correct Answer</th><th>Status</th></tr></thead><tbody>';
            
            questions.forEach((question, index) => {
                const userAnswerIdx = answers[index];
                const userAnswer = userAnswerIdx !== undefined ? question.options[userAnswerIdx] : '(Not answered)';
                const correctAnswer = question.options[question.correct];
                const isCorrect = userAnswerIdx === question.correct;
                const status = isCorrect ? '✓ Correct' : '✗ Incorrect';
                const statusColor = isCorrect ? '#43e97b' : '#f5576c';
                
                html += `<tr style="border-left: 4px solid ${statusColor};">
                    <td>${index + 1}</td>
                    <td>${question.question}</td>
                    <td style="color: ${isCorrect ? '#333' : '#f5576c'}">${userAnswer}</td>
                    <td style="color: #43e97b; font-weight: bold">${correctAnswer}</td>
                    <td style="color: ${statusColor}; font-weight: bold">${status}</td>
                </tr>`;
            });
            
            html += '</tbody></table>';
            answersDisplay.innerHTML = html;
        }

        function downloadAnswers() {
            let score = 0;
            let content = 'IoT Quiz - 50 Questions\n';
            content += 'Student: Vagish Rao\n';
            content += 'Your Answers and Results\n';
            content += '='.repeat(100) + '\n\n';

            questions.forEach((question, index) => {
                const userAnswerIdx = answers[index];
                const userAnswer = userAnswerIdx !== undefined ? question.options[userAnswerIdx] : '(Not answered)';
                const correctAnswer = question.options[question.correct];
                const isCorrect = userAnswerIdx === question.correct;
                
                if (isCorrect) score++;
                
                content += `Question ${index + 1}: ${question.question}\n`;
                content += `Your Answer: ${userAnswer}\n`;
                content += `Correct Answer: ${correctAnswer}\n`;
                content += `Status: ${isCorrect ? 'CORRECT ✓' : 'INCORRECT ✗'}\n`;
                content += '\n' + '-'.repeat(100) + '\n\n';
            });

            const percentage = Math.round((score / questions.length) * 100);
            content += '\n' + '='.repeat(100) + '\n';
            content += `FINAL SCORE: ${score}/${questions.length} (${percentage}%)\n`;
            content += '='.repeat(100) + '\n';

            const element = document.createElement('a');
            element.setAttribute('href', 'data:text/plain;charset=utf-8,' + encodeURIComponent(content));
            element.setAttribute('download', 'IoT_Quiz_Results_Vagish_Rao.txt');
            element.style.display = 'none';
            document.body.appendChild(element);
            element.click();
            document.body.removeChild(element);
        }

        // Initialize quiz on page load
        window.onload = initQuiz;
    </script>
</body>
</html>
